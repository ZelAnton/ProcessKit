name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  aot-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Native AOT prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Build library (resolves <Reference> for the smoke project)
        run: dotnet build src/ProcessKit/ProcessKit.csproj -c Release

      - name: AOT publish smoke test
        run: dotnet publish tests/ProcessKit.AotSmoke/ProcessKit.AotSmoke.csproj -c Release -r linux-x64 -p:PublishAot=true

      - name: Run AOT-compiled binary
        run: ./tests/ProcessKit.AotSmoke/bin/Release/net10.0/linux-x64/publish/ProcessKit.AotSmoke
