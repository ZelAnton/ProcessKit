name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

concurrency:
  group: release
  cancel-in-progress: false

# Default every job to zero token scopes; the release job opts back into exactly what it needs.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Preflight — verify required secrets
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "::error::Required secret NUGET_API_KEY is not set. Aborting before any tag push, build, or publish."
            exit 1
          fi
          echo "Required secrets present."

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail
          # Pipe-free on purpose: `git tag ... | head -n1` can SIGPIPE git (exit 141) once the
          # tag list outgrows the pipe buffer, and `pipefail` would surface that as a release-
          # blocking failure. `for-each-ref` does the sort+limit inside git, no pipe.
          LATEST_TAG=$(git for-each-ref --sort=-v:refname --count=1 --format='%(refname:strip=2)' 'refs/tags/v[0-9]*.[0-9]*.[0-9]*')
          if [[ -n "$LATEST_TAG" ]]; then
            CURRENT="${LATEST_TAG#v}"
            echo "Latest release tag: $LATEST_TAG → current=$CURRENT"
          else
            CURRENT="0.0.0"
            echo "No release tags found → current=0.0.0 (first release)"
          fi
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse current version (got: '$CURRENT')"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) NEW="$((MAJOR+1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Ensure previous tag exists
        env:
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            echo "Previous tag $PREV_TAG already exists."
            exit 0
          fi
          ROOT=$(git rev-list --max-parents=0 HEAD | tail -n1)
          echo "Previous tag $PREV_TAG does not exist; creating it at root commit $ROOT."
          git tag "$PREV_TAG" "$ROOT"
          git push origin "$PREV_TAG"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      - name: Auto-fill [Unreleased] from git log if empty
        env:
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys

          prev_tag = os.environ["PREV_TAG"]
          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          if not m:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          body = m.group(1)
          has_real_bullets = any(re.match(r"^-\s+\S", ln) for ln in body.splitlines())
          if has_real_bullets:
              print("[Unreleased] already has manual entries; skipping auto-fill.")
              sys.exit(0)

          print(f"[Unreleased] is empty; generating from git log since {prev_tag}...")
          result = subprocess.run(
              ["git-cliff", "--config", "cliff.toml", "--strip", "all", f"{prev_tag}..HEAD"],
              check=True,
              capture_output=True,
              text=True,
          )
          generated = result.stdout.strip()
          if not generated:
              print(
                  f"::error::No release-worthy commits found between {prev_tag} and HEAD. "
                  "Either add a manual entry to [Unreleased] in CHANGELOG.md, or commit "
                  "changes with a recognised prefix (Add/Fix/Refactor/Update/Remove/...).",
                  file=sys.stderr,
              )
              sys.exit(1)

          new_text = text[: m.start(1)] + generated + "\n\n" + text[m.end(1) :]
          path.write_text(new_text)
          print("----- auto-generated [Unreleased] body -----")
          print(generated)
          print("--------------------------------------------")
          PY

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          python3 <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("CHANGELOG.md").read_text()
          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          body = (m.group(1) if m else "").strip()

          # Keep "### Header" only if it has at least one real bullet ("- text").
          # Drop placeholder "-" lines and empty sections so notes are clean.
          parts = re.split(r"(?m)(^### .+$)", body)
          out = []
          for i in range(1, len(parts), 2):
              header = parts[i]
              section = parts[i + 1] if i + 1 < len(parts) else ""
              bullets = [ln for ln in section.splitlines() if re.match(r"^-\s+\S", ln)]
              if bullets:
                  if out:
                      out.append("")
                  out.append(header)
                  out.extend(bullets)

          result = "\n".join(out).strip()
          if not result:
              print(
                  "::error::[Unreleased] section in CHANGELOG.md is empty. "
                  "Add release notes before releasing.",
                  file=sys.stderr,
              )
              sys.exit(1)

          pathlib.Path("release-notes.md").write_text(result + "\n")
          print("----- release-notes.md -----")
          print(result)
          print("----------------------------")
          PY

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: dotnet pack src/ProcessKit/ProcessKit.csproj --no-build --configuration Release --output ./artifacts /p:Version=${{ steps.version.outputs.version }}

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd ./artifacts
          files=(*.nupkg *.snupkg)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No package files to hash in ./artifacts."
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          cat SHA256SUMS

      # ── PIVOT: the one irreversible step. Everything before is reversible (nothing left the
      #    runner / VCS); everything after is idempotent + retried so it can never strand this
      #    published version. --skip-duplicate makes "this exact version is already on NuGet" a
      #    success (narrow, registry-specific) — so a re-run after a prior run published but failed
      #    later simply moves on. Retries cover transient registry/network failures.
      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if dotnet nuget push "./artifacts/*.nupkg" \
                --source "https://api.nuget.org/v3/index.json" \
                --api-key "$NUGET_API_KEY" \
                --skip-duplicate; then
              echo "Publish succeeded (attempt $attempt)."
              exit 0
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "::warning::nuget push attempt $attempt failed; retrying in $((attempt * 10))s..."
              sleep "$((attempt * 10))"
            fi
          done
          echo "::error::nuget push failed after 3 attempts. Nothing was tagged or released; re-run the workflow (the version is derived from tags, which have not advanced)."
          exit 1

      - name: Bump version in csproj
        run: sed -i -E "s|<Version>[^<]+</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" src/ProcessKit/ProcessKit.csproj

      - name: Promote Unreleased section in CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          prev_tag = os.environ["PREV_TAG"]
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          repo = "https://github.com/ZelAnton/ProcessKit"

          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          new_unreleased = (
              "## [Unreleased]\n\n"
              "### Added\n-\n\n"
              "### Changed\n-\n\n"
              "### Fixed\n-\n\n"
              f"## [{version}] - {date}"
          )
          text, n = re.subn(r"^## \[Unreleased\]$", new_unreleased, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          link_replacement = (
              f"[Unreleased]: {repo}/compare/{tag}...HEAD\n"
              f"[{version}]: {repo}/compare/{prev_tag}...{tag}"
          )
          text, n = re.subn(r"^\[Unreleased\]:.*$", link_replacement, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '[Unreleased]: ...' reference link in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          path.write_text(text)
          PY

      # Post-pivot VCS bookkeeping. The push is --atomic (branch + tag advance together or not at all),
      # so a failure here leaves the tag unpushed and a re-run is safe (same version recomputed, the
      # already-published package is skipped by --skip-duplicate). Retried to avoid a needless re-run.
      - name: Commit, tag, push
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ProcessKit/ProcessKit.csproj CHANGELOG.md
          # Defensive: if the version/CHANGELOG steps were no-ops (already at target),
          # `git commit` would abort on a clean tree under `set -e` AFTER the NuGet pivot.
          # Tag HEAD regardless so the tag still advances.
          if git diff --cached --quiet; then
            echo "No file changes to commit; tagging existing HEAD."
          else
            git commit -m "Release $TAG"
          fi
          git tag "$TAG"
          for attempt in 1 2 3; do
            if push_output=$(git push --atomic origin HEAD:refs/heads/main "$TAG" 2>&1); then
              echo "$push_output"
              echo "Pushed commit + tag (attempt $attempt)."
              exit 0
            fi
            echo "$push_output"
            # Lost-response guard: a prior attempt may have landed server-side while the
            # client saw a transient error. If the tag is already on origin it can only be
            # from THIS run (Verify-tag-does-not-exist + the `release` concurrency group
            # rule that out otherwise), so treat it as success rather than a false failure.
            if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
              echo "Tag $TAG is already on origin — a prior attempt succeeded. Treating as success."
              exit 0
            fi
            # Branch-protection rejections are PERMANENT, not transient: retrying and the
            # "re-run is safe" framing below would both mislead. Bail out immediately with
            # an actionable message instead.
            if echo "$push_output" | grep -qiE 'protected branch|hook declined|push declined|repository rule|GH006|GH013'; then
              echo "::error::Push to main was REJECTED by branch protection — this is NOT transient, so retrying/re-running will not help."
              echo "::error::The package IS already published to NuGet, but the release commit + tag $TAG were NOT pushed."
              echo "::error::Grant github-actions[bot] a bypass on the 'main' ruleset/branch protection, and verify these rules don't block the bot: required status checks, required signed commits, required linear history, and tag protection on 'v*'."
              echo "::error::Then push the commit + tag manually (git push --atomic origin HEAD:refs/heads/main $TAG), or re-run after fixing the bypass (version is derived from tags, which were not advanced)."
              exit 1
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "::warning::atomic push attempt $attempt failed (treating as transient); retrying in $((attempt * 5))s..."
              sleep "$((attempt * 5))"
            fi
          done
          echo "::error::Failed to push commit + tag after 3 attempts (transient failures). The package is already published to NuGet; re-running the workflow is safe (version is derived from tags, which were not advanced)."
          exit 1

      # Final, fully reversible step — made idempotent ("exists → edit + re-upload, else create") and
      # retried so a transient API blip never strands an already-published+tagged release. If it still
      # fails, the error is explicit: finish by hand, do NOT re-run the workflow (a re-run would read
      # the now-pushed tag, bump to the next version, and orphan this release).
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(./artifacts/*.nupkg ./artifacts/*.snupkg ./artifacts/SHA256SUMS)
          # The .nupkg glob vanishes under nullglob if Pack produced nothing; guard so a
          # broken build can never publish a silent asset-less release.
          nupkgs=(./artifacts/*.nupkg)
          if [[ ${#nupkgs[@]} -eq 0 ]]; then
            echo "::error::No .nupkg found in ./artifacts to attach to release $TAG."
            exit 1
          fi

          # `|| return 1` on every command: a function used as an `if` condition runs with
          # `set -e` DISABLED, so without these an early `gh release edit` failure would be
          # masked by a later succeeding command and silently skip the retry.
          publish_release() {
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists; updating notes and (re)uploading assets."
              gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md || return 1
              gh release upload "$TAG" "${assets[@]}" --clobber || return 1
            else
              gh release create "$TAG" --title "$TAG" --notes-file release-notes.md "${assets[@]}" || return 1
            fi
          }

          for attempt in 1 2 3; do
            if publish_release; then
              echo "GitHub Release $TAG published (attempt $attempt)."
              exit 0
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "::warning::GitHub Release attempt $attempt failed; retrying in $((attempt * 10))s..."
              sleep "$((attempt * 10))"
            fi
          done

          echo "::error::Failed to create/update the GitHub Release for $TAG after 3 attempts."
          echo "::error::The package IS published to NuGet and the tag IS pushed — only the release page is missing."
          echo "::error::Finish MANUALLY (e.g. gh release create $TAG --notes-file release-notes.md ./artifacts/*). Do NOT re-run this workflow: it would bump to the next version and orphan $TAG."
          exit 1
